[pytest]
# Конфигурация pytest для Docker Release Checker

# Директория с тестами
testpaths = tests

# Паттерн для поиска тестовых файлов
python_files = test_*.py

# Паттерн для поиска тестовых классов
python_classes = Test*

# Паттерн для поиска тестовых функций
python_functions = test_*

# Опции по умолчанию
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=src
    --cov-report=term-missing
    --cov-report=html

# Маркеры для категоризации тестов
markers =
    unit: Модульные тесты отдельных компонентов
    integration: Интеграционные тесты
    slow: Медленные тесты

# Минимальный процент покрытия для успеха
[coverage:report]
fail_under = 80
